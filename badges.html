<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Badges — Matri Bhasa</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="index.html" class="nav-brand">
    <div class="nav-logo dev">म</div>
    <div class="nav-brand-text">
      <span class="nav-title">Matri Bhasa</span>
      <span class="nav-subtitle">मातृ भाषा · Mother Language</span>
    </div>
  </a>
  <div class="nav-links">
    <a href="languages.html">Languages</a>
    <a href="badges.html" class="active">Badges</a>
    <a href="about.html">About</a>
  </div>
  <div class="nav-right">
    <div class="chip streak" id="chipStreak" title="Day streak"><span class="chip-icon">🔥</span><span id="streakVal">0</span></div>
    <div class="chip xp" id="chipXp" title="Total XP"><span class="chip-icon">⚡</span><span id="xpVal">0</span></div>
    <div class="chip level" id="chipLevel" title="Level"><span class="chip-icon">🏅</span><span id="levelVal">Seedling</span></div>
  </div>
</nav>

<div class="screen">
  <div class="screen-inner">
    <div class="screen-head">
      <p class="section-eyebrow">Achievements</p>
      <h1 class="section-title">Your badges</h1>
    </div>

    <!-- level summary -->
    <div class="level-card">
      <div class="level-card-top" id="lcTop">🌱 Seedling</div>
      <div class="level-progress" style="margin:0">
        <div class="level-progress-head">
          <span class="level-progress-now" id="lpNow">Level 1</span>
          <span class="level-progress-next" id="lpNext">0 / 60 XP to next</span>
        </div>
        <div class="level-bar"><div class="level-bar-fill" id="lpFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="badges-grid" id="badgesGrid"><!-- rendered by JS --></div>
  </div>
</div>

<div class="xp-toast" id="xpToast"><span>⚡</span><span id="xpToastText">+10 XP</span></div>

<script src="data.js"></script>
<script src="state.js"></script>
<script src="auth.js"></script>
<script src="app.js"></script>
<script>
  const state = loadState();
  renderHud(state);
  consumeXpParam();

  const lv = getLevel(state);
  document.getElementById('lcTop').textContent = lv.level.icon + ' ' + lv.level.name;
  document.getElementById('lpNow').textContent = 'Level ' + (lv.index + 1) + ' of ' + 6;
  document.getElementById('lpFill').style.width = lv.pct + '%';
  document.getElementById('lpNext').textContent = lv.next
    ? `${lv.intoLevel} / ${lv.span} XP to ${lv.next.name} ${lv.next.icon}`
    : 'Max level reached 🏆';

  const earned = earnedBadges(state);
  document.getElementById('badgesGrid').innerHTML = earned.map(b => `
    <div class="badge ${b.earned ? 'earned' : 'locked'}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
    </div>`).join('');
</script>
</body>
</html>
